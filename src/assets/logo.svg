<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ff00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <text x="10" y="55" font-family="'Impact', 'Arial Black', sans-serif" font-size="48" font-weight="900" fill="url(#neonGlow)" filter="url(#glow)" letter-spacing="2">iBOMMA</text>
  <circle cx="245" cy="38" r="6" fill="#00ffcc" filter="url(#glow)"/>
</svg>
